name: Epic
description: Large initiative containing multiple stories
title: "EPIC: "
labels: ["epic"]

body:
    - type: textarea
      id: overview
      attributes:
          label: Overview
          description: Describe the epic and its purpose.
          placeholder: Explain the high level feature or initiative.
      validations:
          required: true

    - type: textarea
      id: goal
      attributes:
          label: Goal
          description: What problem does this epic solve?

    - type: textarea
      id: success
      attributes:
          label: Success Criteria
          description: Define how success will be measured.

    - type: textarea
      id: stories
      attributes:
          label: Related User Stories
          description: List related stories or issues.

    - type: textarea
      id: additional
      attributes:
          label: Additional Context
          description: Architecture notes, diagrams, or links.
