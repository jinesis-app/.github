name: Feature Request
description: Request a new feature
title: "[Feature]: "
labels:
    - type:feature

body:
    - type: textarea
      id: problem
      attributes:
          label: Problem Statement
          description: What problem does this feature solve?

    - type: textarea
      id: solution
      attributes:
          label: Proposed Solution
          description: Describe the solution.

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives Considered
          description: List alternative approaches.

    - type: textarea
      id: impact
      attributes:
          label: Impact
          description: Describe impact on users or system.
