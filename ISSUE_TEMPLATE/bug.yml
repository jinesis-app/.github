name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels:
    - type:bug

body:
    - type: textarea
      id: description
      attributes:
          label: Description
          description: Clearly describe the bug.
      validations:
          required: true

    - type: textarea
      id: reproduce
      attributes:
          label: Steps to Reproduce
          description: Provide steps to reproduce the issue.

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior

    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior

    - type: input
      id: environment
      attributes:
          label: Environment
          description: OS, browser, or app version.

    - type: textarea
      id: logs
      attributes:
          label: Logs or Screenshots
          description: Include relevant logs or screenshots to help reproduce the issue.
